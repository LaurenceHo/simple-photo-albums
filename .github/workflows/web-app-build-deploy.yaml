name: Build and deploy web app

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_ALBUM_APP_TITLE: ${{ secrets.VITE_ALBUM_APP_TITLE }}
      VITE_STATIC_FILES_URL: ${{ secrets.VITE_STATIC_FILES_URL }}
      VITE_IMAGEKIT_CDN_URL: ${{ secrets.VITE_IMAGEKIT_CDN_URL }}
      VITE_MAPBOX_API_KEY: ${{ secrets.VITE_MAPBOX_API_KEY }}
      VITE_WORKER_API_URL: ${{ secrets.VITE_WORKER_API_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GTAG_ID: ${{ secrets.VITE_GTAG_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Test and build
        run: |
          bun run type-check
          bun run test:unit
          bun run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_FOR_GITHUB_DEPLOY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_FOR_GITHUB_DEPLOY }}
          aws-region: us-east-1

      - name: Fetch private assets from S3
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          aws s3 cp s3://$S3_BUCKET/logo.png dist/logo.png
          aws s3 cp s3://$S3_BUCKET/favicon.ico dist/favicon.ico
          aws s3 cp s3://$S3_BUCKET/icons dist/icons --recursive

      - name: Deploy to Cloudflare Pages
        env:
          PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          npx wrangler pages project create "$PAGES_PROJECT" --production-branch=master 2>/dev/null || true
          npx wrangler pages deploy dist --project-name="$PAGES_PROJECT" --commit-dirty=true
