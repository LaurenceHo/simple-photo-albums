name: Build and deploy web app

on:
  push:
    branches:
      - master
    paths:
      - 'ui/src/**'
      - 'ui/package.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_ALBUM_APP_TITLE: ${{ secrets.VITE_ALBUM_APP_TITLE }}
      VITE_STATIC_FILES_URL: ${{ secrets.VITE_STATIC_FILES_URL }}
      VITE_IMAGEKIT_CDN_URL: ${{ secrets.VITE_IMAGEKIT_CDN_URL }}
      VITE_MAPBOX_API_KEY: ${{ secrets.VITE_MAPBOX_API_KEY }}
      VITE_WORKER_API_URL: ${{ secrets.VITE_WORKER_API_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GTAG_ID: ${{ secrets.VITE_GTAG_ID }}

    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2.1.3
      - run: bun install

      - name: Test and build
        run: |
          bun run --cwd ui type-check
          bun run --cwd ui test:unit
          bun run --cwd ui build

      - name: Fetch private assets from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp s3://$R2_BUCKET_NAME/logo.png ui/dist/logo.png --endpoint-url $ENDPOINT
          aws s3 cp s3://$R2_BUCKET_NAME/favicon.ico ui/dist/favicon.ico --endpoint-url $ENDPOINT
          aws s3 cp s3://$R2_BUCKET_NAME/icons ui/dist/icons --recursive --endpoint-url $ENDPOINT

      - name: Deploy to Cloudflare Pages
        env:
          PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          npx wrangler pages project create "$PAGES_PROJECT" --production-branch=master 2>/dev/null || true
          npx wrangler pages deploy ui/dist --project-name="$PAGES_PROJECT" --commit-dirty=true
