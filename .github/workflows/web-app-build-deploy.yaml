name: Build and deploy web app

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "package.json"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_ALBUM_APP_TITLE: ${{ secrets.VITE_ALBUM_APP_TITLE }}
      VITE_STATIC_FILES_URL: ${{ secrets.VITE_STATIC_FILES_URL }}
      VITE_IMAGEKIT_CDN_URL: ${{ secrets.VITE_IMAGEKIT_CDN_URL }}
      VITE_MAPBOX_API_KEY: ${{ secrets.VITE_MAPBOX_API_KEY }}
      VITE_WORKER_API_URL: ${{ secrets.VITE_WORKER_API_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GTAG_ID: ${{ secrets.VITE_GTAG_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Test and build
        run: |
          bun run type-check
          bun run test:unit
          bun run build

      - name: Deploy to Cloudflare Pages
        env:
          PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          npx wrangler pages project create "$PAGES_PROJECT" --production-branch=master 2>/dev/null || true
          npx wrangler pages deploy dist --project-name="$PAGES_PROJECT" --commit-dirty=true
