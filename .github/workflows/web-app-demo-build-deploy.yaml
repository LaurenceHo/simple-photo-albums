name: Build and deploy demo web app

on:
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_ALBUM_APP_TITLE: ${{ vars.VITE_ALBUM_APP_TITLE }}
      VITE_STATIC_FILES_URL: ${{ vars.VITE_STATIC_FILES_URL }}
      VITE_IMAGEKIT_CDN_URL: ${{ vars.VITE_IMAGEKIT_CDN_URL }}
      VITE_MAPBOX_API_KEY: ${{ secrets.VITE_MAPBOX_API_KEY }}
      VITE_WORKER_API_URL: ${{ secrets.VITE_WORKER_API_URL }}
      VITE_MAP_CENTRE_LNG: ${{ vars.VITE_MAP_CENTRE_LNG }}
      VITE_MAP_CENTRE_LAT: ${{ vars.VITE_MAP_CENTRE_LAT }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Test and build
        run: |
          bun run type-check
          bun run test:unit
          bun run build

      - name: Deploy to Cloudflare Pages
        env:
          PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          npx wrangler pages project create "$PAGES_PROJECT" --production-branch=master 2>/dev/null || true
          npx wrangler pages deploy dist --project-name="$PAGES_PROJECT" --commit-dirty=true --branch=master
