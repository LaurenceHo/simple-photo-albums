name: Build and deploy API for demo app

on:
  pull_request:
    branches:
      - master
    paths:
      - 'server/src/**'
      - 'server/package.json'
      - 'server/wrangler.ci.toml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      # Shared across Configure Wrangler + Deploy steps
      D1_PHOTO_ALBUMS_WORKER: ${{ secrets.D1_PHOTO_ALBUMS_WORKER }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Used by envsubst in Configure Wrangler
      ALBUM_URL: ${{ vars.ALBUM_URL }}
      VITE_IMAGEKIT_CDN_URL: ${{ vars.VITE_IMAGEKIT_CDN_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      REGION_NAME: ${{ secrets.REGION_NAME }}
      DEV_PHOTO_ALBUMS_DB_NAME: ${{ secrets.DEV_PHOTO_ALBUMS_DB_NAME }}
      DEV_PHOTO_ALBUMS_DB_ID: ${{ secrets.DEV_PHOTO_ALBUMS_DB_ID }}
      # Dummy values for Prod vars to satisfy wrangler.toml validation
      PROD_PHOTO_ALBUMS_DB_NAME: 'PROD_PHOTO_ALBUMS_DB_NAME'
      PROD_PHOTO_ALBUMS_DB_ID: 'PROD_PHOTO_ALBUMS_DB_ID'
      DEVELOPMENT: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies and test
        run: |
          cd ./server
          bun install
          bun run types:server
          bun run test:server

      - name: Configure Wrangler
        run: |
          cd "$GITHUB_WORKSPACE/server"
          envsubst < wrangler.ci.toml > wrangler.tmp.toml
          mv wrangler.tmp.toml wrangler.toml

      - name: Upload Secrets
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          # Do NOT use real secrets in dev environment - these are dummy values for demo app
          VITE_GOOGLE_CLIENT_ID: 'VITE_GOOGLE_CLIENT_ID'
          GOOGLE_PLACES_API_KEY: 'GOOGLE_PLACES_API_KEY'
          JWT_SECRET: 'JWT_SECRET'
          RAPIDAPI_KEY: 'RAPIDAPI_KEY'
        run: |
          cd "$GITHUB_WORKSPACE/server"
          echo $R2_ACCESS_KEY | npx wrangler versions secret put R2_ACCESS_KEY --name "$D1_PHOTO_ALBUMS_WORKER" --env=""
          echo $R2_SECRET_KEY | npx wrangler versions secret put R2_SECRET_KEY --name "$D1_PHOTO_ALBUMS_WORKER" --env=""
          echo "VITE_GOOGLE_CLIENT_ID" | npx wrangler versions secret put VITE_GOOGLE_CLIENT_ID --name "$D1_PHOTO_ALBUMS_WORKER" --env=""
          echo "GOOGLE_PLACES_API_KEY" | npx wrangler versions secret put GOOGLE_PLACES_API_KEY --name "$D1_PHOTO_ALBUMS_WORKER" --env=""
          echo "JWT_SECRET" | npx wrangler versions secret put JWT_SECRET --name "$D1_PHOTO_ALBUMS_WORKER" --env=""
          echo "RAPIDAPI_KEY" | npx wrangler versions secret put RAPIDAPI_KEY --name "$D1_PHOTO_ALBUMS_WORKER" --env=""

      - name: Deploy Cloudflare Worker
        run: |
          cd "$GITHUB_WORKSPACE/server"
          npx wrangler deploy --name "$D1_PHOTO_ALBUMS_WORKER" --env=""
